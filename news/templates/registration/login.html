{% extends 'news/base.html' %}
{% block title %}Log in{% endblock %}
{% block content %}
    <h1>Log in</h1>
    {% if form.errors %}
        <p style="color:#b00020">
            Username and password did not match. Please try again.
        </p>
    {% endif %}
    <form method="post">
        {% csrf_token %}
        {{ form.as_p }}
        <button type="submit">Log in</button>
    </form>
    <p class="muted">
        New here? <a href="{% url 'register' %}">Create an account</a>.
    </p>
{% endblock %}
